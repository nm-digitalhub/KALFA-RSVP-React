# ==============================================================================
# nginx access-log redaction for Voximplant ctx/cb per-call tokens
# ==============================================================================
#
# WHY
#   The live Voximplant scenario calls back to KALFA at:
#       /api/voximplant/ctx/<per-call-signed-token>
#       /api/voximplant/cb/<per-call-signed-token>
#   The token is a cryptographically signed credential carried IN THE URL PATH.
#   The active beta vhost (conf.d/beta-proxy.conf) logs full request paths, so
#   without this map the token lands in /var/log/nginx/beta-access.log in clear
#   text — a leaked token would let an attacker replay a call context/callback.
#   This snippet rewrites the logged URI so the token is masked as [REDACTED]
#   while leaving the real proxied request (and every other path) untouched.
#
# THIS FILE IS DOCUMENTATION ONLY — IT IS NOT APPLIED.
#   The nginx configuration on this host is root-owned; a Codex/Claude session
#   cannot (and must not) edit or reload it. An operator with root must copy the
#   directives below into the live config and reload nginx by hand.
#
# WHERE EACH PIECE GOES
#   1. The `map` + `log_format` blocks go in the top-level `http { }` context
#      (a map may only be declared at http scope, not inside a server/location).
#   2. The `access_log … kalfa_redacted;` line goes inside the beta `server { }`
#      block (conf.d/beta-proxy.conf), replacing / overriding the existing
#      access_log directive for that vhost so the redacted format is used.
#
# HOW TO APPLY (operator, as root)
#   1. Add the http{}-scope blocks (map + log_format) to the http context —
#      e.g. an included file under /etc/nginx/conf.d/ that loads BEFORE the
#      server block, or nginx.conf's http{} directly.
#   2. Set `access_log` in the beta server{} block to use kalfa_redacted.
#   3. Validate:   nginx -t
#   4. Reload:     systemctl reload nginx      (or: nginx -s reload)
#   5. Confirm a subsequent ctx/cb hit logs "/api/voximplant/ctx/[REDACTED]".
#
# SAFETY
#   Redaction only rewrites the LOGGED string ($vox_logsafe_uri); it does not
#   alter routing, the proxied upstream request, or $request_uri seen by the app.
#   Non-Voximplant paths fall through to `default $request_uri` unchanged.
# ==============================================================================


# --- in http{} — mask the per-call signed token in access logs ----------------
map $request_uri $vox_logsafe_uri {
    default            $request_uri;
    ~^(/api/voximplant/(ctx|cb))/  "$1/[REDACTED]";
}

log_format kalfa_redacted '$remote_addr - $remote_user [$time_local] '
    '"$request_method $vox_logsafe_uri $server_protocol" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent"';


# --- in the beta server{} block -----------------------------------------------
access_log /var/log/nginx/beta-access.log kalfa_redacted;
