<!-- KALFA password-recovery email. Deployed via
     scripts/deploy-recovery-email-template.mjs (Management API), not the dashboard.
     The reset link routes through /auth/confirm with token_hash + type=recovery +
     next=/auth/reset-password. The link host comes from RedirectTo (our
     APP_ORIGIN), never from SiteURL. NOTE: keep this comment free of Go-template
     braces — Supabase renders them anywhere, including inside comments. -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>איפוס סיסמה — KALFA</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f6f6;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f6f6;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:12px;padding:32px;text-align:right;">
            <tr>
              <td style="font-size:20px;font-weight:bold;color:#111111;padding-bottom:12px;">
                איפוס הסיסמה שלך
              </td>
            </tr>
            <tr>
              <td style="font-size:15px;line-height:1.6;color:#444444;padding-bottom:24px;">
                קיבלנו בקשה לאיפוס הסיסמה לחשבונך ב־KALFA. לחצו על הכפתור כדי לבחור סיסמה חדשה. הקישור תקף לזמן מוגבל.
              </td>
            </tr>
            <tr>
              <td style="padding-bottom:24px;">
                <a
                  href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&amp;type=recovery&amp;next=/auth/reset-password"
                  style="display:inline-block;background:#111111;color:#ffffff;text-decoration:none;font-size:15px;font-weight:bold;padding:12px 28px;border-radius:8px;"
                >
                  קביעת סיסמה חדשה
                </a>
              </td>
            </tr>
            <tr>
              <td style="font-size:13px;line-height:1.6;color:#888888;">
                אם לא ביקשתם לאפס את הסיסמה, אפשר להתעלם מהודעה זו — הסיסמה שלכם לא תשתנה.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
