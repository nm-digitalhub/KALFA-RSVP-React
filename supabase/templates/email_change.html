<!-- KALFA email-address-change confirmation. Deployed via a controlled Management
     API script (like recovery), not the dashboard. The link routes through
     /auth/confirm with token_hash + type=email_change + next=/app/settings, and
     the host comes from RedirectTo (our APP_ORIGIN), never from SiteURL. NOTE:
     keep this comment free of Go-template braces — Supabase renders them anywhere,
     including inside comments. -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>אישור כתובת מייל חדשה — KALFA</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f6f6;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f6f6;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:12px;padding:32px;text-align:right;">
            <tr>
              <td style="font-size:20px;font-weight:bold;color:#111111;padding-bottom:12px;">
                אישור כתובת המייל החדשה
              </td>
            </tr>
            <tr>
              <td style="font-size:15px;line-height:1.6;color:#444444;padding-bottom:24px;">
                התקבלה בקשה לשנות את כתובת המייל של חשבונך ב־KALFA לכתובת זו. לחצו על הכפתור כדי לאשר את השינוי. הקישור תקף לזמן מוגבל.
              </td>
            </tr>
            <tr>
              <td style="padding-bottom:24px;">
                <a
                  href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&amp;type=email_change&amp;next=/app/settings"
                  style="display:inline-block;background:#111111;color:#ffffff;text-decoration:none;font-size:15px;font-weight:bold;padding:12px 28px;border-radius:8px;"
                >
                  אישור הכתובת החדשה
                </a>
              </td>
            </tr>
            <tr>
              <td style="font-size:13px;line-height:1.6;color:#888888;">
                אם לא ביקשתם לשנות את כתובת המייל, אפשר להתעלם מהודעה זו — הכתובת לא תשתנה.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
