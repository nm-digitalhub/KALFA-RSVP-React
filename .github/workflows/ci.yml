# Continuous verification for every push and PR — the external, reproducible
# proof of the same gates that run locally before deploy (lint, types, unit
# tests). No secrets required: the unit suite mocks Supabase entirely.
#
# NOT here on purpose:
# - `next build` — needs real env shape and ~minutes; the deploy pipeline on
#   the beta server is the build gate.
# - `npm run verify:db` — live-DB contract checks need the service key; run it
#   manually via the db-contracts workflow (workflow_dispatch) after adding
#   repo secrets, or from the server.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Matches the beta server runtime (node v24).
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run
